  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n  ::placeholder{color:#AAB1BB;}\n  @keyframes skFade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}\n  @keyframes skToast{from{opacity:0;transform:translateY(16px) translateX(-50%);}to{opacity:1;transform:translateY(0) translateX(-50%);}}\n  @keyframes skPop{0%{transform:scale(.96);opacity:0;}100%{transform:scale(1);opacity:1;}}\n  @keyframes skSpin{to{transform:rotate(360deg);}}\n<\u002Fstyle>\n<script src=\"c683d10c-c1bd-4a5c-8779-8cfdfa751c9b\"><\u002Fscript>\n<\u002Fhelmet>\n\n\n<div style=\"min-height:100vh;\">\n\n  <sc-if value=\"{{ showLogin }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;\">\n      <div style=\"background:#fff;border:1px solid #E8ECF1;border-radius:20px;padding:40px 32px;max-width:420px;width:100%;text-align:center;box-shadow:0 12px 32px rgba(11,30,73,.1);animation:skPop .25s ease both;\">\n        <img src=\"15585282-b949-4a29-b5b3-8fcbc410e69f\" alt=\"Skedulo\" style=\"height:22px;margin:0 auto 22px;display:block;\">\n        <div style=\"font-family:'Manrope';font-weight:700;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#0051F2;\">Hackathon 2026<\u002Fdiv>\n        <h1 style=\"font-family:'Manrope';font-weight:800;font-size:27px;color:#0B1E49;margin:10px 0 8px;letter-spacing:-0.02em;line-height:1.1;\">Sign in to sling some bribes<\u002Fh1>\n        <p style=\"font-size:14px;color:#4A525E;line-height:1.55;margin:0 0 24px;\">Skedulo staff only. Sign in with your Skedulo Google account to browse the hacks, pledge prizes and vote.<\u002Fp>\n        <button sc-camel-on-click=\"{{ signIn }}\" style=\"display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#0051F2;color:#fff;border:none;border-radius:10px;padding:13px;font-weight:600;font-size:15px;cursor:pointer;transition:filter 120ms;\" style-hover=\"filter:brightness(0.93)\">\n          <span style=\"{{ googleGlyphStyle }}\">G<\u002Fspan> Continue with Google\n        <\u002Fbutton>\n        <sc-if value=\"{{ authErrorFlag }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"color:#C4675E;font-size:13px;margin-top:16px;font-weight:600;line-height:1.5;\">{{ authErrorText }}<\u002Fdiv><\u002Fsc-if>\n        <sc-if value=\"{{ showPreviewBypass }}\" hint-placeholder-val=\"{{ false }}\">\n          <button sc-camel-on-click=\"{{ previewBypass }}\" style=\"margin-top:18px;background:none;border:none;color:#AAB1BB;font-size:12px;cursor:pointer;text-decoration:underline;\">Skip sign-in (preview only — hidden on the live site)<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showApp }}\" hint-placeholder-val=\"{{ true }}\">\n  <header style=\"position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid #E8ECF1;\">\n    <div style=\"max-width:1140px;margin:0 auto;padding:13px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n      <img src=\"15585282-b949-4a29-b5b3-8fcbc410e69f\" alt=\"Skedulo\" style=\"height:20px;width:auto;display:block;\">\n      <span style=\"font-family:'Manrope';font-weight:800;font-size:15px;color:#0B1E49;letter-spacing:-0.01em;\">Hackathon 2026<\u002Fspan>\n      <span style=\"{{ phasePillStyle }}\">{{ phasePillText }}<\u002Fspan>\n      <nav style=\"margin-left:auto;display:flex;gap:4px;\">\n        <button sc-camel-on-click=\"{{ goHacks }}\" style=\"{{ navHacksStyle }}\">The Hacks<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ goResults }}\" style=\"{{ navResultsStyle }}\">Results<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ goAdmin }}\" style=\"{{ navAdminStyle }}\">Admin<\u002Fbutton>\n        <sc-if value=\"{{ signedIn }}\" hint-placeholder-val=\"{{ false }}\">\n          <button sc-camel-on-click=\"{{ signOut }}\" title=\"{{ userEmail }}\" style=\"display:flex;align-items:center;gap:7px;background:#F4F6F9;border:1px solid #E8ECF1;border-radius:999px;padding:4px 12px 4px 5px;cursor:pointer;margin-left:6px;\">\n            <span style=\"{{ avatarStyle }}\">{{ userInitials }}<\u002Fspan>\n            <span style=\"font-size:13px;font-weight:600;color:#0B1E49;\">Sign out<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"max-width:1140px;margin:0 auto;padding:22px 20px 96px;\">\n\n    <!-- ================= GALLERY ================= -->\n    <sc-if value=\"{{ isGallery }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"display:flex;flex-direction:column;gap:22px;animation:skFade .3s ease both;\">\n\n      <sc-if value=\"{{ prizesOn }}\" hint-placeholder-val=\"{{ true }}\">\n      <section style=\"background:#0051F2;border-radius:20px;padding:34px 34px 30px;color:#fff;position:relative;overflow:hidden;\">\n        <img src=\"cde86ada-542c-43da-981b-696fbd849cc7\" alt=\"\" aria-hidden=\"true\" style=\"position:absolute;right:-40px;top:-30px;height:150%;opacity:.28;pointer-events:none;\">\n        <div style=\"position:relative;\">\n          <div style=\"font-family:'Manrope';font-weight:700;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,.72);\">Phase 1 · Prize pledges<\u002Fdiv>\n          <h1 style=\"font-family:'Manrope';font-weight:800;font-size:clamp(30px,5vw,48px);line-height:1.03;letter-spacing:-0.025em;color:#fff;margin:10px 0 12px;max-width:18ch;\">Back a hack. Bribe the brilliance.<\u002Fh1>\n          <p style=\"max-width:64ch;color:rgba(255,255,255,.92);font-size:16px;line-height:1.55;margin:0 0 14px;\">Every hack gets a team either way — so this isn't about who builds what. It's about cheering on the ones that go big: clever <b style=\"color:#fff;\">use of AI<\u002Fb>, real <b style=\"color:#fff;\">impact for customers<\u002Fb>, a demo that'll <b style=\"color:#fff;\">wow a prospect<\u002Fb>, or pure <b style=\"color:#fff;\">creative genius<\u002Fb>. Spotted one you love? Pledge it a prize.<\u002Fp>\n          <p style=\"max-width:64ch;color:rgba(255,255,255,.82);font-size:14.5px;line-height:1.55;margin:0 0 20px;\">No promises any hack nails it — but a juicy bribe pile is a powerful motivator. If the team takes it on and delivers something great, the reward is theirs. You're backing the boldest ideas to actually happen.<\u002Fp>\n          <div style=\"display:flex;gap:26px;flex-wrap:wrap;\">\n            <div><div style=\"font-family:'Manrope';font-weight:800;font-size:26px;line-height:1;\">{{ totalHacks }}<\u002Fdiv><div style=\"font-size:13px;color:rgba(255,255,255,.75);margin-top:4px;\">hacks in the ring<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-family:'Manrope';font-weight:800;font-size:26px;line-height:1;\">{{ totalPledges }}<\u002Fdiv><div style=\"font-size:13px;color:rgba(255,255,255,.75);margin-top:4px;\">bribes on the table<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-family:'Manrope';font-weight:800;font-size:26px;line-height:1;\">{{ totalPledgers }}<\u002Fdiv><div style=\"font-size:13px;color:rgba(255,255,255,.75);margin-top:4px;\">generous humans<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ voteOnly }}\" hint-placeholder-val=\"{{ false }}\">\n      <section style=\"background:#0051F2;border-radius:20px;padding:34px 34px 30px;color:#fff;position:relative;overflow:hidden;\">\n        <img src=\"cde86ada-542c-43da-981b-696fbd849cc7\" alt=\"\" aria-hidden=\"true\" style=\"position:absolute;right:-40px;top:-30px;height:150%;opacity:.28;pointer-events:none;\">\n        <div style=\"position:relative;\">\n          <div style=\"font-family:'Manrope';font-weight:700;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,.72);\">People's Choice<\u002Fdiv>\n          <h1 style=\"font-family:'Manrope';font-weight:800;font-size:clamp(30px,5vw,48px);line-height:1.03;letter-spacing:-0.025em;color:#fff;margin:10px 0 12px;max-width:16ch;\">Pick your favourite hack.<\u002Fh1>\n          <p style=\"max-width:60ch;color:rgba(255,255,255,.92);font-size:16px;line-height:1.55;margin:0 0 20px;\">The hackathon's done and the hacks are in. You get <b style=\"color:#fff;\">one vote<\u002Fb> — spend it on the build that impressed you most. Clever AI, customer impact, a killer demo, or pure creative brilliance. Choose wisely (you can change your mind, but you can't double up).<\u002Fp>\n          <div style=\"display:flex;gap:26px;flex-wrap:wrap;\">\n            <div><div style=\"font-family:'Manrope';font-weight:800;font-size:26px;line-height:1;\">{{ totalHacks }}<\u002Fdiv><div style=\"font-size:13px;color:rgba(255,255,255,.75);margin-top:4px;\">hacks to choose from<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-family:'Manrope';font-weight:800;font-size:26px;line-height:1;\">{{ totalVotes }}<\u002Fdiv><div style=\"font-size:13px;color:rgba(255,255,255,.75);margin-top:4px;\">votes cast so far<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n      <div style=\"{{ voteBannerStyle }}\">{{ voteBannerText }}<\u002Fdiv>\n\n      <div style=\"display:flex;gap:12px;align-items:center;flex-wrap:wrap;\">\n        <div style=\"position:relative;flex:1;min-width:220px;\">\n          <input value=\"{{ q }}\" sc-camel-on-input=\"{{ setSearch }}\" placeholder=\"Search hacks, people, SPE-1234…\" style=\"width:100%;padding:11px 14px;border:1px solid #D5DBE3;border-radius:8px;font-size:15px;background:#fff;color:#2E3640;\">\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:4px;background:#E8ECF1;padding:4px;border-radius:10px;\">\n          <sc-if value=\"{{ prizesOn }}\" hint-placeholder-val=\"{{ true }}\"><button sc-camel-on-click=\"{{ sortByBribes }}\" style=\"{{ sortBribesStyle }}\">Most bribed<\u002Fbutton><\u002Fsc-if>\n          <button sc-camel-on-click=\"{{ sortByVotes }}\" style=\"{{ sortVotesStyle }}\">Most voted<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ sortByAz }}\" style=\"{{ sortAzStyle }}\">A–Z<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hacksEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#fff;border:1px dashed #D5DBE3;border-radius:16px;padding:40px 24px;text-align:center;\">\n          <div style=\"font-family:'Manrope';font-weight:800;font-size:18px;color:#0B1E49;\">No hacks yet<\u002Fdiv>\n          <p style=\"font-size:14px;color:#4A525E;margin:8px 0 0;\">Your organiser needs to import them — Admin → Backend → “Import the 28 starter hacks”.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;\">\n        <sc-for list=\"{{ hacks }}\" as=\"h\" hint-placeholder-count=\"6\">\n          <article style=\"background:#fff;border:1px solid #E8ECF1;border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:13px;box-shadow:0 1px 2px rgba(11,30,73,.04);\">\n            <div style=\"display:flex;align-items:center;gap:8px;\">\n              <a href=\"{{ h.linearUrl }}\" target=\"_blank\" rel=\"noopener\" sc-camel-on-click=\"{{ stop }}\" title=\"Open in Linear\" style=\"font-family:'Manrope';font-weight:700;font-size:11px;letter-spacing:0.04em;color:#0051F2;background:#EBF1FE;padding:3px 8px;border-radius:6px;text-decoration:none;transition:background 120ms;\" style-hover=\"background:#DCE7FD;\">{{ h.identifier }} ↗<\u002Fa>\n              <span style=\"font-size:12px;color:#AAB1BB;\">{{ h.team }}<\u002Fspan>\n              <span style=\"{{ h.pickBadgeStyle }}\">{{ h.pickBadgeText }}<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"font-family:'Manrope';font-weight:700;font-size:19px;line-height:1.2;letter-spacing:-0.01em;color:#0B1E49;margin:0;\">{{ h.title }}<\u002Fh3>\n            <p style=\"font-size:14px;line-height:1.5;color:#4A525E;margin:0;flex:1;\">{{ h.desc }}<\u002Fp>\n\n            <div style=\"display:flex;align-items:center;gap:9px;\">\n              <span style=\"width:30px;height:30px;border-radius:50%;background:#0B1E49;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">{{ h.initials }}<\u002Fspan>\n              <div style=\"display:flex;flex-direction:column;line-height:1.25;\">\n                <span style=\"font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#AAB1BB;\">Submitted by<\u002Fspan>\n                <span style=\"font-size:13.5px;color:#2E3640;font-weight:600;\">{{ h.owner }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ prizesOn }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"border-top:1px solid #F4F6F9;padding-top:12px;\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;\">\n                <span style=\"font-family:'Manrope';font-weight:700;font-size:12px;letter-spacing:0.04em;text-transform:uppercase;color:#0B1E49;\">The bribe pile<\u002Fspan>\n                <span style=\"font-size:12px;color:#AAB1BB;\">{{ h.pledgeCountLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ h.hasPledges }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;align-items:center;padding-left:8px;margin-bottom:8px;\">\n                  <sc-for list=\"{{ h.thumbs }}\" as=\"t\" hint-placeholder-count=\"3\">\n                    <div title=\"{{ t.label }}\" style=\"{{ t.style }}\">{{ t.letter }}<\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#4A525E;line-height:1.5;\">{{ h.pledgeSummary }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ h.noPledges }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:13px;color:#AAB1BB;font-style:italic;\">Empty. Be the first to sweeten the pot.<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"display:flex;gap:8px;align-items:center;padding-top:2px;\">\n              <sc-if value=\"{{ prizesOn }}\" hint-placeholder-val=\"{{ true }}\">\n                <button sc-camel-on-click=\"{{ h.onPledge }}\" style=\"flex:1;background:#fff;color:#0B1E49;border:1px solid #D5DBE3;border-radius:8px;padding:11px 12px;font-weight:600;font-size:14px;cursor:pointer;transition:background 120ms;\" style-hover=\"background:#F4F6F9;\">Pledge a prize<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ phaseLive }}\" hint-placeholder-val=\"{{ false }}\">\n                <button sc-camel-on-click=\"{{ h.onVote }}\" style=\"{{ h.voteBtnStyle }}\">{{ h.voteBtnText }}<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ phaseLocked }}\" hint-placeholder-val=\"{{ true }}\">\n                <span title=\"Voting opens after the hackathon\" style=\"flex:1;text-align:center;background:#F4F6F9;color:#AAB1BB;border:1px dashed #D5DBE3;border-radius:8px;padding:11px 12px;font-weight:600;font-size:13px;\">Voting locked<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= RESULTS ================= -->\n    <sc-if value=\"{{ isResults }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;flex-direction:column;gap:24px;animation:skFade .3s ease both;\">\n      <div>\n        <div style=\"font-family:'Manrope';font-weight:700;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#0051F2;\">People's Choice · Live<\u002Fdiv>\n        <h1 style=\"font-family:'Manrope';font-weight:800;font-size:clamp(28px,4.5vw,42px);letter-spacing:-0.02em;color:#0B1E49;margin:8px 0 6px;\">{{ resultsHeading }}<\u002Fh1>\n        <p style=\"font-size:15px;color:#4A525E;margin:0;max-width:60ch;\">{{ resultsSub }}<\u002Fp>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasVotes }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:26px;\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:end;\">\n          <sc-for list=\"{{ podium }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <div style=\"{{ p.cardStyle }}\">\n              <div style=\"{{ p.medalStyle }}\">{{ p.rank }}<\u002Fdiv>\n              <div style=\"font-family:'Manrope';font-weight:800;font-size:15px;line-height:1.2;color:#0B1E49;margin-top:10px;\">{{ p.title }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#4A525E;margin-top:3px;\">{{ p.owner }}<\u002Fdiv>\n              <div style=\"font-family:'Manrope';font-weight:800;font-size:26px;color:#0051F2;margin-top:8px;\">{{ p.votes }}<\u002Fdiv>\n              <div style=\"font-size:11px;color:#AAB1BB;text-transform:uppercase;letter-spacing:0.06em;\">votes<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff;border:1px solid #E8ECF1;border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:12px;\">\n          <div style=\"font-family:'Manrope';font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:0.06em;color:#0B1E49;\">Full leaderboard<\u002Fdiv>\n          <sc-for list=\"{{ ranked }}\" as=\"r\" hint-placeholder-count=\"8\">\n            <div style=\"display:flex;align-items:center;gap:12px;\">\n              <span style=\"width:22px;text-align:right;font-family:'Manrope';font-weight:700;font-size:13px;color:#AAB1BB;flex-shrink:0;\">{{ r.rank }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0;\">\n                <div style=\"display:flex;justify-content:space-between;gap:10px;margin-bottom:5px;\">\n                  <span style=\"font-size:13.5px;font-weight:600;color:#0B1E49;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ r.title }}<\u002Fspan>\n                  <span style=\"font-size:13px;font-weight:700;color:#2E3640;flex-shrink:0;\">{{ r.votes }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"height:10px;background:#E8ECF1;border-radius:6px;overflow:hidden;\">\n                  <div style=\"{{ r.barStyle }}\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasComments }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#fff;border:1px solid #E8ECF1;border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:16px;\">\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;\">\n            <div style=\"font-family:'Manrope';font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:0.06em;color:#0B1E49;\">Why people voted<\u002Fdiv>\n            <span style=\"font-size:12px;color:#AAB1BB;\">{{ commentCountLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{ commentGroups }}\" as=\"g\" hint-placeholder-count=\"3\">\n            <div style=\"border-top:1px solid #F4F6F9;padding-top:14px;\">\n              <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:10px;\">\n                <span style=\"font-family:'Manrope';font-weight:700;font-size:11px;color:#0051F2;background:#EBF1FE;padding:3px 8px;border-radius:6px;\">{{ g.identifier }}<\u002Fspan>\n                <span style=\"font-family:'Manrope';font-weight:700;font-size:14px;color:#0B1E49;\">{{ g.title }}<\u002Fspan>\n                <span style=\"font-size:12px;color:#AAB1BB;margin-left:auto;\">{{ g.countLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:9px;\">\n                <sc-for list=\"{{ g.comments }}\" as=\"c\" hint-placeholder-count=\"2\">\n                  <div style=\"display:flex;gap:9px;align-items:flex-start;\">\n                    <span style=\"{{ c.avatarStyle }}\">{{ c.initials }}<\u002Fspan>\n                    <div style=\"flex:1;min-width:0;\">\n                      <div style=\"font-size:12px;font-weight:600;color:#0B1E49;\">{{ c.name }}<\u002Fdiv>\n                      <div style=\"font-size:13.5px;color:#4A525E;line-height:1.5;\">“{{ c.text }}”<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ noVotes }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#fff;border:1px dashed #D5DBE3;border-radius:16px;padding:48px 24px;text-align:center;\">\n          <div style=\"font-family:'Manrope';font-weight:800;font-size:20px;color:#0B1E49;\">{{ emptyResultsTitle }}<\u002Fdiv>\n          <p style=\"font-size:14px;color:#4A525E;margin:8px 0 0;\">{{ emptyResultsSub }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= ADMIN ================= -->\n    <sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:skFade .3s ease both;\">\n      <sc-if value=\"{{ adminLocked }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"max-width:420px;margin:40px auto;background:#fff;border:1px solid #E8ECF1;border-radius:16px;padding:28px;box-shadow:0 4px 12px rgba(11,30,73,.06);\">\n          <h2 style=\"font-family:'Manrope';font-weight:800;font-size:22px;color:#0B1E49;margin:0 0 6px;\">Organiser's clubhouse<\u002Fh2>\n          <p style=\"font-size:14px;color:#4A525E;margin:0 0 18px;\">Password required. If you're not running this thing, shoo.<\u002Fp>\n          <input type=\"password\" value=\"{{ adminPass }}\" sc-camel-on-input=\"{{ setAdminPass }}\" sc-camel-on-key-down=\"{{ onAdminKey }}\" placeholder=\"Passcode\" style=\"width:100%;padding:12px 14px;border:1px solid #D5DBE3;border-radius:8px;font-size:15px;margin-bottom:12px;\">\n          <sc-if value=\"{{ adminError }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"color:#E98B82;font-size:13px;margin-bottom:12px;font-weight:600;\">Nope. Try again.<\u002Fdiv><\u002Fsc-if>\n          <button sc-camel-on-click=\"{{ tryAdmin }}\" style=\"width:100%;background:#0051F2;color:#fff;border:none;border-radius:8px;padding:12px;font-weight:600;font-size:15px;cursor:pointer;\">Unlock<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ adminOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n\n        <div style=\"background:#fff;border:1px solid #E8ECF1;border-radius:16px;padding:20px;\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px;\">\n            <span style=\"{{ connDotStyle }}\"><\u002Fspan>\n            <div style=\"font-family:'Manrope';font-weight:800;font-size:17px;color:#0B1E49;\">Backend — {{ modeLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size:13px;color:#4A525E;margin:0 0 14px;line-height:1.55;max-width:66ch;\">{{ connHelp }}<\u002Fp>\n          <sc-if value=\"{{ isLocalMode }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:10px;max-width:520px;\">\n              <input ref=\"{{ connUrlRef }}\" placeholder=\"Project URL — https://xxxxx.supabase.co\" style=\"width:100%;padding:11px 13px;border:1px solid #D5DBE3;border-radius:8px;font-size:14px;\">\n              <input ref=\"{{ connKeyRef }}\" placeholder=\"anon public key — eyJhbGci...\" style=\"width:100%;padding:11px 13px;border:1px solid #D5DBE3;border-radiu            <div style=\"{{ tr.style }}\">{{ tr.line }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <p style=\"font-size:12px;color:#AAB1BB;margin:14px 0 0;line-height:1.6;\">Data note: when connected to Supabase, votes, pledges and prize photos are shared live across everyone and vote dedup is enforced by the database (one row per email). Until then, this runs in local demo mode in your browser only.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ================= PLEDGE MODAL ================= -->\n  <sc-if value=\"{{ pledgeOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div sc-camel-on-click=\"{{ closePledge }}\" style=\"position:fixed;inset:0;z-index:50;background:rgba(11,30,73,.55);display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;\">\n    <div sc-camel-on-click=\"{{ stop }}\" style=\"background:#fff;border-radius:18px;max-width:460px;width:100%;padding:26px;margin-top:4vh;animation:skPop .2s ease both;box-shadow:0 20px 50px rgba(11,30,73,.3);\">\n      <div style=\"font-family:'Manrope';font-weight:700;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#0051F2;\">Sweeten the pot<\u002Fdiv>\n      <h2 style=\"font-family:'Manrope';font-weight:800;font-size:22px;color:#0B1E49;margin:6px 0 4px;line-height:1.15;\">Pledge a prize to<br>“{{ pledgeHackTitle }}”<\u002Fh2>\n      <p style=\"font-size:13px;color:#4A525E;line-height:1.55;margin:8px 0 18px;\">A spare gadget from home, a pizza, a six-pack — anything goes. Fulfilment happens offline; we just capture the bribe here.<\u002Fp>\n\n      <div style=\"display:flex;align-items:center;gap:9px;background:#F4F6F9;border-radius:10px;padding:10px 12px;margin-bottom:14px;\">\n        <span style=\"{{ pledgerAvatarStyle }}\">{{ pledgerInitials }}<\u002Fspan>\n        <div style=\"line-height:1.25;\">\n ight:600;font-size:15px;cursor:pointer;\">{{ voteSubmitText }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= IDENTITY MODAL ================= -->\n  <sc-if value=\"{{ identityOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div sc-camel-on-click=\"{{ closeIdentity }}\" style=\"position:fixed;inset:0;z-index:50;background:rgba(11,30,73,.55);display:flex;align-items:center;justify-content:center;padding:24px;\">\n    <div sc-camel-on-click=\"{{ stop }}\" style=\"background:#fff;border-radius:18px;max-width:400px;width:100%;padding:26px;animation:skPop .2s ease both;box-shadow:0 20px 50px rgba(11,30,73,.3);\">\n      <h2 style=\"font-family:'Manrope';font-weight:800;font-size:21px;color:#0B1E49;margin:0 0 4px;\">One quick thing<\u002Fh2>\n      <p style=\"font-size:13.5px;color:#4A525E;line-height:1.55;margin:0 0 18px;\">Tell us who you are so nobody can vote twice. One vote each — choose wisely.<\u002Fp>\n      <label style=\"display:block;font-size:12px;font-weight:600;color:#0B1E49;margin-bottom:5px;\">Your name<\u002Flabel>\n      <input ref=\"{{ idNameRef }}\" placeholder=\"Firstname Lastname\" style=\"width:100%;padding:11px 13px;border:1px solid #D5DBE3;border-radius:8px;font-size:15px;margin-bottom:14px;\">\n      <label style=\"display:block;font-size:12px;font-weight:600;color:#0B1E49;margin-bottom:5px;\">Skedulo email<\u002Flabel>\n      <input ref=\"{{ idEmailRef }}\" type=\"email\" placeholder=\"you@skedulo.com\" style=\"width:100%;padding:11px 13px;border:1px solid #D5DBE3;border-radius:8px;font-size:15px;margin-bottom:6px;\">\n      <sc-if value=\"{{ idError }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"color:#E98B82;font-size:12.5px;margin-bottom:10px;font-weight:600;\">{{ idErrorText }}<\u002Fdiv><\u002Fsc-if>\n      <div style=\"display:flex;gap:10px;margin-top:12px;\">\n        <button sc-camel-on-click=\"{{ closeIdentity }}\" style=\"flex:1;background:#fff;color:#0B1E49;border:1px solid #D5DBE3;border-radius:8px;padding:12px;font-weight:600;font-size:15px;cursor:pointer;\">Cancel<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ submitIdentity }}\" style=\"flex:2;background:#0051F2;color:#fff;border:none;border-radius:8px;padding:12px;font-weight:600;font-size:15px;cursor:pointer;\">Cast my vote<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= EDIT HACK MODAL ================= -->\n  <sc-if value=\"{{ editOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div sc-camel-on-click=\"{{ closeEdit }}\" style=\"position:fixed;inset:0;z-index:50;background:rgba(11,30,73,.55);display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;\">\n    <div sc-camel-on-click=\"{{ stop }}\" style=\"background:#fff;border-radius:18px;max-width:480px;width:100%;padding:26px;margin-top:4vh;animation:skPop .2s ease both;box-shadow:0 20px 50px rgba(11,30,73,.3);\">\n      <h2 style=\"font-family:'Manrope';font-weight:800;font-size:21px;color:#0B1E49;margin:0 0 16px;\">{{ editTitle }}<\u002Fh2>\n      <label style=\"display:block;font-size:12px;font-weight:600;color:#0B1E49;margin-bottom:5px;\">Title<\u002Flabel>\n      <input ref=\"{{ eTitleRef }}\" sc-camel-default-value=\"{{ editDraft.title }}\" style=\"width:100%;padding:11px 13px;border:1px solid #D5DBE3;border-radius:8px;font-size:15px;margin-bottom:13px;\">\n      <label style=\"display:block;font-size:12px;font-weight:600;color:#0B1E49;margin-bottom:5px;\">One-line description<\u002Flabel>\n      <textarea ref=\"{{ eDescRef }}\" sc-camel-default-value=\"{{ editDraft.desc }}\" rows=\"2\" style=\"width:100%;padding:11px 13px;border:1px solid #D5DBE3;border-radius:8px;font-size:15px;margin-bottom:13px;resize:vertical;\"><\u002Ftextarea>\n      <div style=\"display:flex;gap:12px;\">\n        <div style=\"flex:1;\"><label style=\"display:block;font-size:12px;font-weight:600;color:#0B1E49;margin-bottom:5px;\">Owner / team lead<\u002Flabel>\n        <input ref=\"{{ eOwnerRef }}\" sc-camel-default-value=\"{{ editDraft.owner }}\" style=\"width:100%;padding:11px 13px;border:1px solid #D5DBE3;border-radius:8px;font-size:15px;margin-bottom:13px;\"><\u002Fdiv>\n        <div style=\"flex:1;\"><label style=\"display:block;font-size:12px;font-weight:600;color:#0B1E49;margin-bottom:5px;\">SPE id<\u002Flabel>\n        <input ref=\"{{ eIdRef }}\" sc-camel-default-value=\"{{ editDraft.identifier }}\" style=\"width:100%;padding:11px 13px;border:1px solid #D5DBE3;border-radius:8px;font-size:15px;margin-bottom:13px;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <label style=\"display:block;font-size:12px;font-weight:600;color:#0B1E49;margin-bottom:5px;\">Team<\u002Flabel>\n      <input ref=\"{{ eTeamRef }}\" sc-camel-default-value=\"{{ editDraft.team }}\" style=\"width:100%;padding:11px 13px;border:1px solid #D5DBE3;border-radius:8px;font-size:15px;margin-bottom:20px;\">\n      <div style=\"display:flex;gap:10px;\">\n        <button sc-camel-on-click=\"{{ closeEdit }}\" style=\"flex:1;background:#fff;color:#0B1E49;border:1px solid #D5DBE3;border-radius:8px;padding:12px;font-weight:600;font-size:15px;cursor:pointer;\">Cancel<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ saveEdit }}\" style=\"flex:2;background:#0051F2;color:#fff;border:none;border-radius:8px;padding:12px;font-weight:600;font-size:15px;cursor:pointer;\">Save hack<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= LOADING ================= -->\n  <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:70;background:rgba(244,246,249,.9);display:flex;align-items:center;justify-content:center;\">\n      <div style=\"width:38px;height:38px;border:3px solid #CFE0FE;border-top-color:#0051F2;border-radius:50%;animation:skSpin .7s linear infinite;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= TOAST ================= -->\n  <sc-if value=\"{{ toastOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:60;background:#0B1E49;color:#fff;padding:13px 22px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 12px 32px rgba(11,30,73,.3);animation:skToast .3s ease both;\">{{ toastText }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst STORE_KEY = 'sk_hackathon_2026_v1';\nconst VOTER_KEY = 'sk_hackathon_voter_v1';\nconst CONN_KEY  = 'sk_supabase_conn_v1';\nconst ADMIN_PASS = 'password';\n\n// Bake your Supabase project credentials here so every teammate connects automatically.\n// The anon (public) key is designed to ship in the browser — access is governed by table policies.\nconst SUPABASE_URL = 'https://kjqpmxlmwnhtavscetcw.supabase.co';\nconst SUPABASE_ANON_KEY = 'sb_publishable_KaqK2crZm0Dzr_sn67GwGA_NqlCpg_c';\n\nfunction getConn() {\n  try { const o = JSON.parse(localStorage.getItem(CONN_KEY)); if (o && o.url && o.key) return o; } catch (e) {}\n  if (SUPABASE_URL && SUPABASE_ANON_KEY) return { url: SUPABASE_URL, key: SUPABASE_ANON_KEY };\n  return null;\n}\nfunction saveConn(o) { try { localStorage.setItem(CONN_KEY, JSON.stringify(o)); } catch (e) {} }\nfunction clearConn() { try { localStorage.setItem(CONN_KEY, 'null'); } catch (e) {} }\nfunction loadLib() {\n  return new Promise((res) => {\n    if (window.supabase && window.supabase.createClient) return res();\n    const t = setInterval(() => { if (window.supabase && window.supabase.createClient) { clearInterval(t); res(); } }, 60);\n    setTimeout(() => { clearInterval(t); res(); }, 8000);\n  });\n}\n\nconst SEED_HACKS = [\n  ['SPE-1090','NavBar Quick-Setup Wizard','Filipe Arena','A guided wizard that gets a new nav bar configured in minutes, not menus.'],\n  ['SPE-1054','Self-Service Maintenance Rescheduling for Customer Notifications','Alana Bubbers','Let customers reschedule maintenance visits themselves, right from a notification.'],\n  ['SPE-1055','AI Powered customer portal on Skedulo','Sophie Wheeler','A customer-facing portal on Skedulo, with AI doing the heavy lifting.'],\n  ['SPE-1056','External release note processing','Evan Hollonds','Turn raw release notes into polished, external-ready updates automatically.'],\n  ['SPE-1057','Interactive Skedulo CLI with Ink','Evan Hollonds','A slick, interactive command line for Skedulo, built with Ink.'],\n  ['SPE-1060','Service Duration Optimization','Mark Graham','Smarter, data-driven estimates of how long each job really takes.'],\n  ['SPE-1061','Pulse Analytics','Mark Graham','A live pulse on the metrics that matter, at a glance.'],\n  ['SPE-1064','DatadogGenie: Text-to-Dashboard AI Agent','Son Dang','Describe the dashboard you want and the Datadog Genie builds it.'],\n  ['SPE-1065','SkedAssist: AI Operations Copilot for Solutions Engineers','Son Dang','An AI ops copilot in the corner of every solutions engineer.'],\n  ['SPE-1066','Function 2.0 — a governed TypeScript function runtime','Hoang Phung','A governed, locked-down TypeScript runtime for safer custom functions.'],\n  ['SPE-1067','Claude-stats: move our usage dashboard from POC to GA','Stephen Neighbour','Take the Claude usage dashboard from proof-of-concept to fully shipped.'],\n  ['SPE-1068','Skedulo Knowledge Hub','Oanh Dang','One searchable home for everything Skedulo knows.'],\n  ['SPE-1069','AI Voice Booking Agent for call-center overflow','Kirsten Stevens','An AI voice agent that picks up when the call centre overflows.'],\n  ['SPE-1070','Live Roster Management Agent','Kirsten Stevens','An agent that keeps the roster balanced in real time.'],\n  ['SPE-1071','Explainability Panel — why the scheduler decided','Kirsten Stevens','See exactly why the scheduler made the call it did.'],\n  ['SPE-1072','Self-Service Check-In / Arrival Kiosk','Kirsten Stevens','A kiosk that lets people check themselves in on arrival.'],\n  ['SPE-1073','Dynamic Job Label Rename','Kirsten Stevens','Call a Job an Appointment, Visit or Shift — whatever fits your world.'],\n  ['SPE-1074','Database Agent (DBAG)','Martin Greber','An agent that talks to your database so you do not have to.'],\n  ['SPE-1082','Real-time notifications for Schedulers','Ned Mules','Instant nudges so schedulers never miss a change.'],\n  ['SPE-1083','Customise object labels — overrides and plurals','Ned Mules','Rename and pluralise object labels to match your business.'],\n  ['SPE-1084','Product Feedback Technical Analysis Agent','Ned Mules','An agent that reads product feedback and surfaces the technical signal.'],\n  ['SPE-1085','Developer skills plugin for efficiency and quality','Ned Mules','A plugin that boosts developer speed and code quality.'],\n  ['SPE-1086','Running Late Alerts','Christine Bensko','Give customers a heads-up the moment a job is running behind.'],\n  ['SPE-1087','Jira Archive MCP for licence-less historical search','Russell Adcock','Search historical Jira without paying for another licence.'],\n  ['SPE-1088','CR Concierge: Slack message to customer PR','Russell Adcock','From a Slack message to a customer PR, skipping the queue.'],\n  ['SPE-1089','Demo Video Autopilot: AI fix-verification recordings','Dang Huynh','AI-generated recordings that prove the fix actually works.'],\n  ['SPE-1063','Kiosk experience v1 for Shift Scheduling','Paul Ciappara','A first-cut kiosk for picking up and managing shifts.'],\n  ['SPE-1062','Clean geo-data table — snap raw GPS to locations','Paul Ciappara','Snap messy raw GPS into clean, logical locations.'],\n];\n\n// ---- Data layer (swap the body of load/save for Skedulo GraphQL custom objects) ----\nconst Store = {\n  load() {\n    try { const raw = localStorage.getItem(STORE_KEY); if (raw) return JSON.parse(raw); } catch (e) {}\n    return null;\n  },\n  save(data) {\n    try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); return true; }\n    catch (e) { return false; }\n  },\n  loadVoter() { try { return JSON.parse(localStorage.getItem(VOTER_KEY)); } catch (e) { return null; } },\n  saveVoter(v) { try { localStorage.setItem(VOTER_KEY, JSON.stringify(v)); } catch (e) {} }\n};\n\nfunction seedData() {\n  return {\n    hacks: SEED_HACKS.map((h, i) => ({ id: 'h' + (i + 1), identifier: h[0], title: h[1], owner: h[2], team: 'Special Projects', desc: h[3] })),\n    pledges: [],\n    votes: [],\n    config: { votingLive: false }\n  };\n}\n\n// ---- Pure vote helpers (unit-tested by the admin self-test button) ----\nfunction applyVote(votes, email, name, hackId, comment) {\n  const rest = votes.filter(v => v.email !== email);\n  return rest.concat([{ email: email, name: name, hackId: hackId, comment: comment || '', at: Date.now() }]);\n}\nfunction tally(hacks, votes) {\n  const m = {};\n  hacks.forEach(h => { m[h.id] = 0; });\n  votes.forEach(v => { if (m[v.hackId] != null) m[v.hackId] += 1; });\n  return m;\n}\n\nconst AV_COLORS = ['#0051F2','#0B1E49','#4CB5AA','#E98B82','#3B82F6','#AAB1BB'];\nfunction initials(name) {\n  return (name || '?').trim().split(/\\s+/).slice(0, 2).map(w => w[0] ? w[0].toUpperCase() : '').join('') || '?';\n}\n\nclass Component extends DCLogic {\n  state = {\n    screen: 'gallery', data: null, voter: null, q: '', sortBy: 'bribes',\n    pledgeFor: null, pendingPhoto: null,\n    identityFor: null, idError: '',\n    voteFor: null, voteComment: '',\n    adminAuthed: false, adminPass: '', adminError: false,\n    editHack: null,\n    toast: '', testResults: null,\n    pendingBlob: null, loading: true, mode: 'local', connError: '', busy: false,\n    authUser: null, authChecked: false, authError: ''\n  };\n  ALLOWED_DOMAIN = 'skedulo.com';\n\n  constructor(props) {\n    super(props);\n    this.pledgeNameRef = React.createRef();\n    this.pledgePrizeRef = React.createRef();\n    this.idNameRef = React.createRef();\n    this.idEmailRef = React.createRef();\n    this.eTitleRef = React.createRef();\n    this.eDescRef = React.createRef();\n    this.eOwnerRef = React.createRef();\n    this.eIdRef = React.createRef();\n    this.eTeamRef = React.createRef();\n    this.connUrlRef = React.createRef();\n    this.connKeyRef = React.createRef();\n  }\n\n  async componentDidMount() {\n    const voter = Store.loadVoter();\n    const conn = getConn();\n    if (conn) { this.setState({ voter }); await this.connect(conn, true); if (this.state.mode === 'cloud') this.initAuth(); }\n    else { this.setState({ voter, data: Store.load() || seedData(), mode: 'local', loading: false }); }\n  }\n\n  // ---- Google auth (staff-only gate) ----\n  async initAuth() {\n    try {\n      this.client.auth.onAuthStateChange((_e, session) => this.applySession(session));\n      const { data } = await this.client.auth.getSession();\n      this.applySession(data.session);\n    } catch (e) {}\n    this.setState({ authChecked: true });\n  }\n  applySession(session) {\n    if (!session || !session.user) { this.setState({ authUser: null }); return; }\n    const email = (session.user.email || '').toLowerCase();\n    if (!email.endsWith('@' + this.ALLOWED_DOMAIN)) {\n      this.setState({ authUser: null, authError: 'That account (' + email + ') isn’t a @' + this.ALLOWED_DOMAIN + ' address — Skedulo staff only.' });\n      try { this.client.auth.signOut(); } catch (e) {}\n      return;\n    }\n    const m = session.user.user_metadata || {};\n    const name = m.full_name || m.name || email.split('@')[0];\n    this.setState({ authUser: { email, name, avatar: m.avatar_url || '' }, authError: '', voter: { email, name } });\n  }\n  signIn() {\n    this.client.auth.signInWithOAuth({\n      provider: 'google',\n      options: { redirectTo: location.href.split('#')[0], queryParams: { hd: this.ALLOWED_DOMAIN, prompt: 'select_account' } }\n    });\n  }\n  signOut() { try { this.client.auth.signOut(); } catch (e) {} this.setState({ authUser: null, voter: null, previewGuest: false }); this.toast('Signed out'); }\n  get isProdHost() { return /github\\.io$/.test(location.hostname); }\n  previewBypass() { this.setState({ previewGuest: true, voter: { email: 'preview@skedulo.com', name: 'Preview User' } }); }\n  componentWillUnmount() { if (this._ch && this.client) { try { this.client.removeChannel(this._ch); } catch (e) {} } }\n\n  get isCloud() { return this.state.mode === 'cloud'; }\n  commit(data) { Store.save(data); this.setState({ data: data }); }\n\n  // ---- Supabase backend ----\n  async connect(conn, silent) {\n    this.setState({ loading: true, connError: '' });\n    await loadLib();\n    if (!window.supabase || !window.supabase.createClient) {\n      this.setState({ loading: false, mode: 'local', data: this.state.data || Store.load() || seedData(),\n        connError: 'Could not load the Supabase library (network blocked?). Running in local mode.' });\n      return;\n    }\n    try {\n      this.client = window.supabase.createClient(conn.url, conn.key);\n      const data = await this.cloudFetch();\n      saveConn(conn);\n      this.subscribe();\n      this.setState({ data, mode: 'cloud', loading: false, connError: '' });\n      if (!silent) this.toast('Connected to Supabase');\n    } catch (e) {\n      this.setState({ loading: false, mode: 'local', data: this.state.data || Store.load() || seedData(),\n        connError: 'Connection failed: ' + (e.message || e) + ' — check the URL/key and that you ran the SQL setup.' });\n    }\n  }\n  async cloudFetch() {\n    const c = this.client;\n    const [h, p, v, cfg] = await Promise.all([\n      c.from('hacks').select('*').order('sort', { ascending: true }),\n      c.from('pledges').select('*').order('created_at', { ascending: true }),\n      c.from('votes').select('*'),\n      c.from('app_config').select('*').eq('id', 1).maybeSingle()\n    ]);\n    if (h.error) throw h.error; if (p.error) throw p.error; if (v.error) throw v.error;\n    return {\n      hacks: (h.data || []).map(r => ({ id: r.id, identifier: r.identifier, title: r.title, owner: r.owner, team: r.team, desc: r.descr })),\n      pledges: (p.data || []).map(r => ({ id: r.id, hackId: r.hack_id, pledgerName: r.pledger_name, prizeText: r.prize_text, photo: r.photo_url, at: r.created_at })),\n      votes: (v.data || []).map(r => ({ email: r.email, name: r.name, hackId: r.hack_id, comment: r.comment || '' })),\n      config: { votingLive: cfg.data ? !!cfg.data.voting_live : false, voteOnly: cfg.data ? !!cfg.data.vote_only : false }\n    };\n  }\n  async refetchCloud() { try { const data = await this.cloudFetch(); this.setState({ data }); } catch (e) {} }\n  subscribe() {\n    if (this._ch) { try { this.client.removeChannel(this._ch); } catch (e) {} }\n    this._ch = this.client.channel('sk-live')\n      .on('postgres_changes', { event: '*', schema: 'public' }, () => { clearTimeout(this._rt); this._rt = setTimeout(() => this.refetchCloud(), 350); })\n      .subscribe();\n  }\n  connectClick() {\n    const url = (this.connUrlRef.current && this.connUrlRef.current.value || '').trim().replace(/\\/+$/, '');\n    const key = (this.connKeyRef.current && this.connKeyRef.current.value || '').trim();\n    if (!/^https:\\/\\/.+\\.supabase\\.co$/.test(url)) { this.setState({ connError: 'That URL looks off — it should look like https://abcde.supabase.co' }); return; }\n    if (key.length < 30) { this.setState({ connError: 'That anon key looks too short.' }); return; }\n    this.connect({ url, key }, false);\n  }\n  disconnect() {\n    clearConn();\n    if (this._ch && this.client) { try { this.client.removeChannel(this._ch); } catch (e) {} }\n    this.client = null;\n    this.setState({ mode: 'local', data: Store.load() || seedData(), connError: '' });\n    this.toast('Disconnected — back in local mode');\n  }\n  reloadCloud() { this.refetchCloud(); this.toast('Reloaded from Supabase'); }\n  async importSeed() {\n    const rows = SEED_HACKS.map((h, i) => ({ id: 'h' + (i + 1), identifier: h[0], title: h[1], owner: h[2], team: 'Special Projects', descr: h[3], sort: i }));\n    const r = await this.client.from('hacks').upsert(rows, { onConflict: 'id' });\n    if (r.error) { this.toast('Import failed: ' + r.error.message); return; }\n    await this.refetchCloud();\n    this.toast('28 starter hacks imported');\n  }\n  async cloudPledge(name, prize) {\n    this.setState({ busy: true });\n    try {\n      let url = null;\n      if (this.state.pendingBlob) {\n        const path = 'pl_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7) + '.jpg';\n        const up = await this.client.storage.from('prize-photos').upload(path, this.state.pendingBlob, { contentType: 'image/jpeg' });\n        if (up.error) throw up.error;\n        url = this.client.storage.from('prize-photos').getPublicUrl(path).data.publicUrl;\n      }\n      const ins = await this.client.from('pledges').insert({ hack_id: this.state.pledgeFor, pledger_name: name, prize_text: prize, photo_url: url });\n      if (ins.error) throw ins.error;\n      await this.refetchCloud();\n      this.setState({ pledgeFor: null, pendingPhoto: null, pendingBlob: null, busy: false });\n      this.toast('Bribe locked in. Nicely done.');\n    } catch (e) { this.setState({ busy: false }); this.toast('Pledge failed: ' + (e.message || e)); }\n  }\n  async cloudVote(v, id, comment) {\n    try {\n      const already = this.state.data.votes.find(x => x.email === v.email);\n      const up = await this.client.from('votes').upsert({ email: v.email, name: v.name, hack_id: id, comment: comment || null }, { onConflict: 'email' });\n      if (up.error) throw up.error;\n      await this.refetchCloud();\n      this.toast(already ? 'Vote moved. This is the one now.' : 'Vote counted. Thanks!');\n    } catch (e) { this.toast(/comment/.test(e.message || '') ? 'Add the comment column first (see chat).' : 'Vote failed: ' + (e.message || e)); }\n  }\n  async cloudToggle(target) {\n    const up = await this.client.from('app_config').update({ voting_live: target }).eq('id', 1).select();\n    if (up.error) { this.toast('Failed: ' + up.error.message); return; }\n    if (!up.data || !up.data.length) {\n      const ins = await this.client.from('app_config').insert({ id: 1, voting_live: target });\n      if (ins.error) { this.toast('Failed: ' + ins.error.message); return; }\n    }\n    await this.refetchCloud();\n    this.toast(target ? 'Voting is now in progress' : 'Voting closed');\n  }\n  toggleVoteOnly() {\n    const target = !this.state.data.config.voteOnly;\n    if (this.isCloud) return this.cloudVoteOnly(target);\n    const d = this.state.data;\n    this.commit(Object.assign({}, d, { config: Object.assign({}, d.config, { voteOnly: target }) }));\n    this.toast(target ? 'Vote-only mode ON' : 'Vote-only mode OFF');\n  }\n  async cloudVoteOnly(target) {\n    const up = await this.client.from('app_config').update({ vote_only: target }).eq('id', 1).select();\n    if (up.error) { this.toast(/vote_only/.test(up.error.message) ? 'Add the vote_only column first (see chat).' : 'Failed: ' + up.error.message); return; }\n    if (!up.data || !up.data.length) await this.client.from('app_config').insert({ id: 1, vote_only: target });\n    await this.refetchCloud();\n    this.toast(target ? 'Vote-only mode ON' : 'Vote-only mode OFF');\n  }\n  async cloudSaveHack(draft, fields) {\n    const row = { identifier: fields.identifier, title: fields.title, owner: fields.owner, team: fields.team, descr: fields.desc };\n    let r;\n    if (draft.id) r = await this.client.from('hacks').update(row).eq('id', draft.id);\n    else r = await this.client.from('hacks').insert(Object.assign({ id: 'h' + Date.now(), sort: 9999 }, row));\n    if (r.error) { this.toast('Save failed: ' + r.error.message); return; }\n    await this.refetchCloud();\n    this.setState({ editHack: null });\n    this.toast(draft.id ? 'Hack updated' : 'Hack added');\n  }\n  async cloudDeleteHack(id) {\n    const r = await this.client.from('hacks').delete().eq('id', id);\n    if (r.error) { this.toast('Delete failed: ' + r.error.message); return; }\n    await this.refetchCloud();\n    this.toast('Hack removed');\n  }\n  async cloudLoadSample(votes, pledges) {\n    const vRows = votes.map(v => ({ email: v.email, name: v.name, hack_id: v.hackId, comment: v.comment || null }));\n    const pRows = pledges.map(p => ({ hack_id: p.hackId, pledger_name: p.pledgerName, prize_text: p.prizeText, photo_url: null }));\n    const rv = await this.client.from('votes').upsert(vRows, { onConflict: 'email' });\n    const rp = await this.client.from('pledges').insert(pRows);\n    if (rv.error || rp.error) { this.toast('Sample failed: ' + ((rv.error || rp.error).message)); return; }\n    await this.refetchCloud();\n    this.toast('Sample data loaded');\n  }\n  async cloudClearVotes() {\n    const r = await this.client.from('votes').delete().neq('email', '__none__');\n    if (r.error) { this.toast('Failed: ' + r.error.message); return; }\n    await this.refetchCloud(); this.toast('Votes cleared');\n  }\n  async cloudResetAll() {\n    await this.client.from('votes').delete().neq('email', '__none__');\n    await this.client.from('pledges').delete().neq('pledger_name', '__none__');\n    await this.client.from('app_config').upsert({ id: 1, voting_live: false });\n    await this.refetchCloud();\n    this.setState({ testResults: null });\n    this.toast('Votes & pledges reset (hacks kept)');\n  }\n\n  toast(msg) {\n    this.setState({ toast: msg });\n    clearTimeout(this._t);\n    this._t = setTimeout(() => this.setState({ toast: '' }), 2600);\n  }\n\n  // ---- pledge ----\n  openPledge(id) { this.setState({ pledgeFor: id, pendingPhoto: null, pendingBlob: null }); }\n  closePledge() { this.setState({ pledgeFor: null, pendingPhoto: null, pendingBlob: null }); }\n  onPhotoPick(e) {\n    const file = e.target.files && e.target.files[0];\n    if (!file) return;\n    const img = new Image();\n    const reader = new FileReader();\n    reader.onload = (ev) => {\n      img.onload = () => {\n
